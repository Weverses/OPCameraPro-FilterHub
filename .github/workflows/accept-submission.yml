name: Accept Filter Submission

on:
  issues:
    types:
      - labeled

permissions:
  contents: write
  issues: write

jobs:
  accept:
    if: github.event.label.name == 'accepted' && contains(github.event.issue.labels.*.name, 'filter-submission')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Ingest approved package
        id: ingest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 tools/ingest_submission.py --issue "${{ github.event.issue.number }}" > ingest.log
          cat ingest.log
      - name: Commit package
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "Add filter from issue #${{ github.event.issue.number }}"
          git push origin main
          echo "changed=true" >> "$GITHUB_OUTPUT"
      - name: Comment and close issue
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" --body "[OK] Accepted and added to \`packages/\`. The Pages publishing workflow will update the public repository index automatically."
          gh issue close "${{ github.event.issue.number }}" --reason completed
