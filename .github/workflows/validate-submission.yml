name: Auto Accept Filter Submission

on:
  issues:
    types:
      - opened
      - edited

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

jobs:
  accept:
    if: github.event.issue.state == 'open' && (contains(github.event.issue.labels.*.name, 'filter-submission') || startsWith(github.event.issue.title, '[Filter]'))
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Ingest package
        id: ingest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          python3 tools/ingest_submission.py --issue "${{ github.event.issue.number }}" > ingest.log 2>&1
          status=$?
          {
            echo "status=$status"
            echo "body<<EOF"
            cat ingest.log
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          exit 0
      - name: Commit accepted package
        id: commit
        if: steps.ingest.outputs.status == '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "Add filter from issue #${{ github.event.issue.number }}"
          git push origin main
          echo "changed=true" >> "$GITHUB_OUTPUT"
      - name: Build Pages artifact
        if: steps.commit.outputs.changed == 'true'
        run: python3 tools/build_index.py
      - name: Upload Pages artifact
        if: steps.commit.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - name: Deploy Pages
        if: steps.commit.outputs.changed == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Comment success and close
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INGEST_BODY: ${{ steps.ingest.outputs.body }}
        run: |
          body_file="$(mktemp)"
          {
            echo "[OK] Package validation passed and the filter has been published automatically."
            echo
            echo "[OK] 滤镜包校验通过，已自动发布。"
            echo
            echo "[Notice] Automation only verified the technical package format, checksums, size limits, and required files. It is not a copyright, license, or legal review."
            echo
            echo "[提示] 自动流程只验证技术格式、校验和、大小限制和必要文件；这不代表版权、授权或法律审核。"
            echo
            echo "\`\`\`json"
            echo "$INGEST_BODY"
            echo "\`\`\`"
          } > "$body_file"
          gh issue comment "${{ github.event.issue.number }}" --body-file "$body_file"
          gh issue close "${{ github.event.issue.number }}" --reason completed
      - name: Comment failure
        if: steps.ingest.outputs.status != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INGEST_BODY: ${{ steps.ingest.outputs.body }}
        run: |
          body_file="$(mktemp)"
          {
            echo "[FAIL] Package validation failed. Please export and attach a new \`.opcfilter.zip\` package."
            echo
            echo "[FAIL] 滤镜包校验失败，请重新从 OPCameraPro 导出并上传新的 \`.opcfilter.zip\`。"
            echo
            echo "[Notice] Automation only validates technical package format. It cannot approve copyright, license, or legal status."
            echo
            echo "[提示] 自动流程只校验技术格式，不能确认版权、授权或法律状态。"
            echo
            echo "\`\`\`text"
            echo "$INGEST_BODY"
            echo "\`\`\`"
          } > "$body_file"
          gh issue comment "${{ github.event.issue.number }}" --body-file "$body_file"
